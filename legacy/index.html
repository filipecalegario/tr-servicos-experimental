<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termo de Referência · Codex Oficial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Geist:wght@300..700&family=JetBrains+Mono:ital,wght@0,400..600;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body class="codex">
    <div class="codex-grain" aria-hidden="true"></div>
    <div class="codex-edge" aria-hidden="true"></div>
    <header class="codex-masthead" aria-hidden="true">
      <span class="codex-masthead__mark">§</span>
      <span class="codex-masthead__series">SÉRIE TR · EXPERIMENTAL</span>
      <span class="codex-masthead__rule"></span>
      <span class="codex-masthead__id">DOSSIÊ Nº 2026/01</span>
    </header>
    <div id="root"></div>
    <footer class="codex-colophon" aria-hidden="true">
      <span>COLÓFON</span>
      <span class="codex-colophon__rule"></span>
      <span>Composto em Fraunces &amp; Geist · Impresso digitalmente</span>
      <span class="codex-colophon__rule"></span>
      <span>FOL. <em>i</em></span>
    </footer>
    <script type="module" src="./index.js"></script>
  </body>
</html>
